simulation:
  delay_ms: 50
  frames: 500
  random_seed: 50

environment:
  generator:
    enabled: true
    complexity: 10      # Number of random obstacles to spawn
    width: 15.0         # X boundary of the room
    height: 15.0        # Y boundary of the room
    overlap_boundaries: true # Allows random blocks to overlap wall to add feature complexity
    min_area: 1.0     # Minimum polygon area in square units
    max_area: 8.0     # Maximum polygon area in square units
  # You can still provide manual walls here if generator.enabled is false
  walls: []

sensor:
  fov_degrees: 30
  num_rays: 8
  max_range: 15.0
  noise:
    enabled: true
    min_relative_std: 0.005
    max_relative_std: 0.05

feature_extraction:
  enable_corners: true
  enable_line_segments: true
  enable_endpoints: true
  enable_junctions: true
  window_size: 2
  line_min_points: 3
  max_neighbor_gap: 1.0
  min_segment_span: 0.2
  max_line_residual: 0.12
  min_corner_angle_deg: 45
  max_corner_angle_deg: 135
  nms_radius: 1
  junction_merge_distance: 0.3
  endpoint_merge_distance: 0.25
  persistence_frames: 500
  association_radius: 0.35

motion:
  linear_speed: 0.2
  random_turn_deg: 5
  collision_turn_deg: 15
  collision_distance: 1.0

odometry_noise:
  distance_std: 0.01
  angle_std_deg: 0.025

voxel_grid:
  voxel_size: 0.35
  min_points_per_voxel: 3
  point_size: 30
  point_alpha: 0.9
  color: darkorange

occupancy_grid:
  enabled: true
  cell_size: 0.2
  width: 17.0
  height: 17.0
  origin_x: -1.0
  origin_y: -1.0
  log_odds_hit: 0.85
  log_odds_free: 0.4
  log_odds_min: -4.0
  log_odds_max: 4.0
  occupied_threshold: 0.65
  free_threshold: 0.35
  ray_subsample: 1

agent:
  initial_pose:
    x: 2.0
    y: 2.0
    theta_deg: 45
  startup_behavior:
    enabled: true
    mode: spin_in_place
    rotation_degrees: 360
    turn_step_deg: 15

plot:
  figsize: [8, 8]
  xlim: [-1, 16]
  ylim: [-1, 16]
  point_size: 10
  point_alpha: 0.08
  show_point_cloud: false   # Show or hide the raw accumulated point cloud
  show_voxel_grid: false   # Show or hide the voxel-grid overlay
  show_occupancy_grid: true   # Show or hide the occupancy-grid overlay
  show_ekf_overlay: false   # Show or hide the live EKF diagnostics text overlay
  show_landmark_tracks: true   # Show or hide the landmark-track overlay
  track_color_mode: quality   # Track coloring: quality, age, or augmented

ekf:
  mode: full_slam   # Use pose_only or full_slam to enable EKF state augmentation with landmarks
  pose_update:
    nis_threshold: 50.0   # Reject EKF correction updates whose normalized innovation is too large
  association:
    line_orientation_threshold_deg: 20.0   # Maximum orientation mismatch allowed for line-segment track matching
    line_extent_ratio_threshold: 0.6   # Maximum normalized length mismatch allowed for line-segment track matching
  augmentation:
    min_observations: 3   # Do not augment a landmark into full_slam state until it has been seen enough times
    min_track_quality: 0.6   # Alternatively allow augmentation once the track quality is high enough
